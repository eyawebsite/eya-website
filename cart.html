<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - EYA</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>EYA</h1>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="shop.html">Shop</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="about.html">About</a></li>
<li><a href="login.html">👤</a></li>
</ul>
</nav>

<h2>Your Shopping Cart</h2>
<div class="coupon">

<h2>Have a Coupon?</h2>

<input type="text" id="coupon" placeholder="Enter Coupon Code">

<button onclick="applyCoupon()">Apply</button>

<p id="coupon-message"></p>

</div>
    

<div class="cart-box" id="cart-box">
</div>

</div>

<script>
function applyCoupon(){
    let code = document.getElementById("coupon").value.toUpperCase();
    let message = document.getElementById("coupon-message");

    if(code === "EYA10"){
        message.innerHTML = "🎉 Coupon Applied! 10% OFF";
    }else{
        message.innerHTML = "❌ Invalid Coupon Code";
    }
}
</script>
    <script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartBox = document.getElementById("cart-box");

if (cart.length === 0) {

    cartBox.innerHTML = `
        <h3>Your cart is empty 🛒</h3>
        <p>Start shopping to add your favourite products.</p>
        <button onclick="location.href='shop.html'">
            Continue Shopping
        </button>
    `;

} else {

    let html = "";

    let total = 0;

    cart.forEach(function(product){

        total += product.price * product.quantity;

        html += `
            <img src="${product.image}" width="180">
            <h3>${product.name}</h3>
            <p>₹${product.price}</p>
            <p>Quantity: ${product.quantity}</p>
            <hr>
        `;

    });

    html += `<h2>Total: ₹${total}</h2>`;

    html += `
        <button onclick="location.href='checkout.html'">
            Proceed to Checkout
        </button>
    `;

    cartBox.innerHTML = html;

}
    </script>
</body>
</html>
